apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleetmind-app
  namespace: fleetmind
  labels:
    app: fleetmind
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fleetmind
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fleetmind
    spec:
      containers:
        - name: fleetmind
          image: fleetmind:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: fleetmind-secrets
          env:
            - name: ML_SERVICE_URL
              value: "http://ml-service:8000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/me
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/me
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-service
  namespace: fleetmind
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ml-service
  template:
    metadata:
      labels:
        app: ml-service
    spec:
      containers:
        - name: ml-service
          image: fleetmind-ml:latest
          ports:
            - containerPort: 8000
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: fleetmind-service
  namespace: fleetmind
spec:
  selector:
    app: fleetmind
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: ml-service
  namespace: fleetmind
spec:
  selector:
    app: ml-service
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fleetmind-ingress
  namespace: fleetmind
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  rules:
    - host: fleetmind.co.za
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fleetmind-service
                port:
                  number: 80
  tls:
    - hosts:
        - fleetmind.co.za
      secretName: fleetmind-tls
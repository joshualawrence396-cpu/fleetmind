    <circle cx="70" cy="165" r="22" fill="#334155"/>
    <circle cx="70" cy="165" r="12" fill="#475569"/>
    <circle cx="70" cy="165" r="4" fill="#6366f1"/>
    <circle cx="160" cy="165" r="30" fill="#1e293b"/>
    <circle cx="160" cy="165" r="22" fill="#334155"/>
    <circle cx="160" cy="165" r="12" fill="#475569"/>
    <circle cx="160" cy="165" r="4" fill="#6366f1"/>
    <circle cx="350" cy="165" r="30" fill="#1e293b"/>
    <circle cx="350" cy="165" r="22" fill="#334155"/>
    <circle cx="350" cy="165" r="12" fill="#475569"/>
    <circle cx="350" cy="165" r="4" fill="#6366f1"/>
    <circle cx="410" cy="165" r="28" fill="#1e293b"/>
    <circle cx="410" cy="165" r="20" fill="#334155"/>
    <circle cx="410" cy="165" r="10" fill="#475569"/>
    <circle cx="410" cy="165" r="4" fill="#4f46e5"/>
    <!-- Exhaust smoke -->
    <circle cx="425" cy="-10" r="12" fill="#475569" opacity="0.3"/>
    <circle cx="430" cy="-28" r="16" fill="#475569" opacity="0.2"/>
    <circle cx="422" cy="-46" r="20" fill="#475569" opacity="0.1"/>
  </g>

  <!-- TRUCK 2 - Green (mid) -->
  <g transform="translate(980, 710)" filter="url(#glow)">
    <!-- Trailer -->
    <rect x="0" y="20" width="280" height="110" rx="8" fill="url(#truck3)"/>
    <rect x="5" y="25" width="270" height="100" rx="6" fill="#059669" opacity="0.5"/>
    <text x="130" y="85" font-family="Arial" font-size="22" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">FleetMind</text>
    <!-- Cab -->
    <rect x="240" y="0" width="120" height="105" rx="8" fill="#047857"/>
    <rect x="245" y="5" width="110" height="42" rx="6" fill="#065f46" opacity="0.7"/>
    <!-- Windshield -->
    <rect x="248" y="7" width="104" height="38" rx="5" fill="#022c22" opacity="0.8"/>
    <!-- Headlights -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="60%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0d1526"/>
    </linearGradient>
    <linearGradient id="road" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="truck1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="truck2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="truck3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="spotlight1" cx="30%" cy="80%" r="40%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="spotlight2" cx="70%" cy="90%" r="35%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Sky background -->
  <rect width="1920" height="1080" fill="url(#sky)"/>

  <!-- Stars -->
  <g opacity="0.6">
    <circle cx="100" cy="50" r="1.5" fill="white" opacity="0.8"/>
    <circle cx="250" cy="30" r="1" fill="white" opacity="0.6"/>
    <circle cx="400" cy="80" r="1.5" fill="white" opacity="0.9"/>
    <circle cx="600" cy="20" r="1" fill="white" opacity="0.7"/>
    <circle cx="750" cy="60" r="2" fill="white" opacity="0.5"/>
    <circle cx="900" cy="40" r="1" fill="white" opacity="0.8"/>
    <circle cx="1100" cy="25" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="1300" cy="70" r="1" fill="white" opacity="0.9"/>
    <circle cx="1500" cy="35" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="1700" cy="55" r="1" fill="white" opacity="0.5"/>
    <circle cx="1850" cy="20" r="2" fill="white" opacity="0.8"/>
    <circle cx="200" cy="120" r="1" fill="white" opacity="0.4"/>
    <circle cx="500" cy="140" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="800" cy="100" r="1" fill="white" opacity="0.7"/>
    <circle cx="1200" cy="130" r="1" fill="white" opacity="0.5"/>
    <circle cx="1600" cy="90" r="1.5" fill="white" opacity="0.8"/>
  </g>

  <!-- City skyline silhouette far back -->

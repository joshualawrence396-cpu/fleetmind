    <rect x="960" y="850" width="120" height="6" rx="3"/>
    <rect x="1120" y="850" width="120" height="6" rx="3"/>
    <rect x="1280" y="850" width="120" height="6" rx="3"/>
    <rect x="1440" y="850" width="120" height="6" rx="3"/>
    <rect x="1600" y="850" width="120" height="6" rx="3"/>
    <rect x="1760" y="850" width="120" height="6" rx="3"/>

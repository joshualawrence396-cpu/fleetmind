    <polygon points="364,40 400,25 400,55 364,50" fill="#fbbf24" opacity="0.12"/>
    <!-- Wheels -->
    <circle cx="60" cy="140" r="26" fill="#1e293b"/>
    <circle cx="60" cy="140" r="18" fill="#334155"/>
    <circle cx="60" cy="140" r="10" fill="#475569"/>
    <circle cx="60" cy="140" r="3" fill="#10b981"/>
    <circle cx="140" cy="140" r="26" fill="#1e293b"/>
    <circle cx="140" cy="140" r="18" fill="#334155"/>
    <circle cx="140" cy="140" r="10" fill="#475569"/>
    <circle cx="140" cy="140" r="3" fill="#10b981"/>
    <circle cx="290" cy="140" r="26" fill="#1e293b"/>
    <circle cx="290" cy="140" r="18" fill="#334155"/>
    <circle cx="290" cy="140" r="10" fill="#475569"/>
    <circle cx="290" cy="140" r="3" fill="#10b981"/>
    <circle cx="340" cy="140" r="24" fill="#1e293b"/>
    <circle cx="340" cy="140" r="16" fill="#334155"/>
    <circle cx="340" cy="140" r="8" fill="#475569"/>
    <circle cx="340" cy="140" r="3" fill="#059669"/>
  </g>

  <!-- TRUCK 3 - Small Purple (far back, smaller) -->
  <g transform="translate(1500, 730)" opacity="0.7">
    <rect x="0" y="15" width="200" height="85" rx="6" fill="url(#truck2)"/>
    <text x="95" y="65" font-family="Arial" font-size="16" font-weight="bold" fill="white" text-anchor="middle" opacity="0.8">FM</text>
    <rect x="172" y="0" width="90" height="85" rx="6" fill="#7c3aed"/>
    <rect x="175" y="4" width="84" height="32" rx="4" fill="#5b21b6" opacity="0.7"/>
    <rect x="248" y="30" width="12" height="9" rx="2" fill="#fbbf24"/>
    <polygon points="260,32 290,20 290,44 260,39" fill="#fbbf24" opacity="0.1"/>
    <circle cx="40" cy="108" r="20" fill="#1e293b"/>
    <circle cx="40" cy="108" r="14" fill="#334155"/>
    <circle cx="40" cy="108" r="7" fill="#475569"/>
    <circle cx="100" cy="108" r="20" fill="#1e293b"/>
    <circle cx="100" cy="108" r="14" fill="#334155"/>
    <circle cx="100" cy="108" r="7" fill="#475569"/>
    <circle cx="210" cy="108" r="20" fill="#1e293b"/>
    <circle cx="210" cy="108" r="14" fill="#334155"/>
    <circle cx="210" cy="108" r="7" fill="#475569"/>
    <circle cx="248" cy="108" r="18" fill="#1e293b"/>
    <circle cx="248" cy="108" r="12" fill="#334155"/>
    <circle cx="248" cy="108" r="6" fill="#475569"/>
  </g>

  <!-- TRUCK 4 - Tiny (very far back) -->

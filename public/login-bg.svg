    <rect x="35" y="560" width="8" height="10" rx="1"/>
    <rect x="20" y="580" width="8" height="10" rx="1"/>
    <rect x="35" y="600" width="8" height="10" rx="1"/>
    <rect x="100" y="520" width="8" height="10" rx="1"/>
    <rect x="115" y="520" width="8" height="10" rx="1"/>
    <rect x="100" y="545" width="8" height="10" rx="1"/>
    <rect x="220" y="490" width="8" height="10" rx="1"/>
    <rect x="240" y="490" width="8" height="10" rx="1"/>
    <rect x="220" y="515" width="8" height="10" rx="1"/>
    <rect x="240" y="515" width="8" height="10" rx="1"/>
    <rect x="1560" y="510" width="8" height="10" rx="1"/>
    <rect x="1580" y="510" width="8" height="10" rx="1"/>
    <rect x="1560" y="535" width="8" height="10" rx="1"/>
    <rect x="1700" y="495" width="8" height="10" rx="1"/>
    <rect x="1720" y="495" width="8" height="10" rx="1"/>
    <rect x="1700" y="520" width="8" height="10" rx="1"/>
    <rect x="1720" y="520" width="8" height="10" rx="1"/>
    <rect x="1820" y="475" width="8" height="10" rx="1"/>
    <rect x="1840" y="475" width="8" height="10" rx="1"/>
    <rect x="1860" y="475" width="8" height="10" rx="1"/>
  </g>
  <g fill="#10b981" opacity="0.3">
    <rect x="50" y="575" width="8" height="10" rx="1"/>
    <rect x="130" y="545" width="8" height="10" rx="1"/>
    <rect x="260" y="510" width="8" height="10" rx="1"/>
    <rect x="1595" y="530" width="8" height="10" rx="1"/>
    <rect x="1740" y="500" width="8" height="10" rx="1"/>
    <rect x="1875" y="490" width="8" height="10" rx="1"/>
  </g>

  <!-- Spotlights -->
  <rect width="1920" height="1080" fill="url(#spotlight1)"/>
  <rect width="1920" height="1080" fill="url(#spotlight2)"/>

  <!-- Road -->
  <rect x="0" y="750" width="1920" height="330" fill="url(#road)"/>

  <!-- Road center line glow -->
  <rect x="0" y="755" width="1920" height="3" fill="url(#glow1)" opacity="0.5"/>

  <!-- Road markings -->
  <g fill="#334155" opacity="0.6">
    <rect x="0" y="850" width="120" height="6" rx="3"/>
    <rect x="160" y="850" width="120" height="6" rx="3"/>
    <rect x="320" y="850" width="120" height="6" rx="3"/>
    <rect x="480" y="850" width="120" height="6" rx="3"/>
    <rect x="640" y="850" width="120" height="6" rx="3"/>

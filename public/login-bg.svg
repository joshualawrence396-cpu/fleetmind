    <rect x="70" y="450" width="60" height="350"/>
    <rect x="120" y="480" width="40" height="320"/>
    <rect x="150" y="420" width="70" height="380"/>
    <rect x="210" y="460" width="50" height="340"/>
    <rect x="250" y="400" width="80" height="400"/>
    <rect x="320" y="440" width="45" height="360"/>
    <rect x="360" y="470" width="60" height="330"/>
    <rect x="1400" y="430" width="80" height="370"/>
    <rect x="1470" y="400" width="60" height="400"/>
    <rect x="1520" y="450" width="70" height="350"/>
    <rect x="1580" y="420" width="50" height="380"/>
    <rect x="1620" y="460" width="80" height="340"/>
    <rect x="1690" y="410" width="60" height="390"/>
    <rect x="1740" y="440" width="70" height="360"/>
    <rect x="1800" y="390" width="50" height="410"/>

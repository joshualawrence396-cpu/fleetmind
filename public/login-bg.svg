    <rect x="10" y="125" width="320" height="8" rx="4" fill="#818cf8" opacity="0.4"/>
    <text x="160" y="105" font-family="Arial" font-size="28" font-weight="bold" fill="white" text-anchor="middle" opacity="0.9">FleetMind</text>
    <text x="160" y="125" font-family="Arial" font-size="14" fill="#a5b4fc" text-anchor="middle" opacity="0.8">LOGISTICS</text>
    <!-- Cab -->
    <rect x="290" y="0" width="140" height="120" rx="10" fill="#4338ca"/>
    <rect x="295" y="5" width="130" height="50" rx="8" fill="#312e81" opacity="0.6"/>
    <!-- Windshield -->

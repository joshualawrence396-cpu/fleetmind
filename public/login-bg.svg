    <rect x="90" y="500" width="80" height="580"/>
    <rect x="160" y="530" width="60" height="550"/>
    <rect x="210" y="470" width="90" height="610"/>
    <rect x="290" y="510" width="70" height="570"/>
    <rect x="1550" y="490" width="90" height="590"/>
    <rect x="1630" y="520" width="70" height="560"/>

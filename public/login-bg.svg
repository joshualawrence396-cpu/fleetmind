    <rect x="0" y="10" width="130" height="60" rx="5" fill="#6366f1"/>
    <rect x="110" y="0" width="60" height="60" rx="5" fill="#4f46e5"/>
    <rect x="160" y="20" width="10" height="8" rx="1" fill="#fbbf24"/>
    <circle cx="25" cy="78" r="14" fill="#1e293b"/>
    <circle cx="25" cy="78" r="9" fill="#334155"/>
    <circle cx="65" cy="78" r="14" fill="#1e293b"/>
    <circle cx="65" cy="78" r="9" fill="#334155"/>
    <circle cx="135" cy="78" r="14" fill="#1e293b"/>
    <circle cx="135" cy="78" r="9" fill="#334155"/>
    <circle cx="160" cy="78" r="12" fill="#1e293b"/>
    <circle cx="160" cy="78" r="8" fill="#334155"/>
  </g>

  <!-- Street lights -->
  <g stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6">
    <line x1="480" y1="600" x2="480" y2="760"/>
    <path d="M480,600 Q500,580 520,580" fill="none"/>
    <circle cx="520" cy="578" r="6" fill="#fbbf24" opacity="0.8"/>
  </g>
  <g stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6">
    <line x1="960" y1="600" x2="960" y2="760"/>
    <path d="M960,600 Q980,580 1000,580" fill="none"/>
    <circle cx="1000" cy="578" r="6" fill="#fbbf24" opacity="0.8"/>
  </g>
  <g stroke="#6366f1" stroke-width="2" fill="none" opacity="0.6">
    <line x1="1440" y1="620" x2="1440" y2="760"/>
    <path d="M1440,620 Q1460,600 1480,600" fill="none"/>
    <circle cx="1480" cy="598" r="5" fill="#fbbf24" opacity="0.8"/>
  </g>

  <!-- Light beams on road from headlights -->
  <polygon points="515,760 460,850 600,850 590,760" fill="#fbbf24" opacity="0.03"/>
  <polygon points="1368,760 1310,850 1440,850 1440,760" fill="#fbbf24" opacity="0.025"/>

  <!-- Purple glow on road -->
  <ellipse cx="350" cy="780" rx="200" ry="30" fill="#6366f1" opacity="0.08"/>
  <ellipse cx="1100" cy="790" rx="160" ry="25" fill="#8b5cf6" opacity="0.06"/>

  <!-- Animated-looking speed lines (motion blur effect) -->
  <g stroke="#6366f1" stroke-width="1" opacity="0.1">
    <line x1="0" y1="800" x2="1920" y2="795"/>
    <line x1="0" y1="810" x2="1920" y2="808"/>
    <line x1="0" y1="820" x2="1920" y2="818"/>
  </g>

  <!-- Overlay gradient for card area -->
  <linearGradient id="overlay" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:0.3"/>
    <stop offset="40%" style="stop-color:#0a0f1e;stop-opacity:0.7"/>
    <stop offset="60%" style="stop-color:#0a0f1e;stop-opacity:0.7"/>
    <stop offset="100%" style="stop-color:#0a0f1e;stop-opacity:0.3"/>
  </linearGradient>
  <rect width="1920" height="1080" fill="url(#overlay)"/>

  <!-- Top fade -->
  <linearGradient id="topfade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:1"/>
    <stop offset="30%" style="stop-color:#0a0f1e;stop-opacity:0"/>
  </linearGradient>
  <rect width="1920" height="300" fill="url(#topfade)"/>

  <!-- Bottom fade -->
  <linearGradient id="bottomfade" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" style="stop-color:#0a0f1e;stop-opacity:0"/>
    <stop offset="100%" style="stop-color:#0a0f1e;stop-opacity:0.9"/>
  </linearGradient>
  <rect y="800" width="1920" height="280" fill="url(#bottomfade)"/>
</svg>
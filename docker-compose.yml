version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: fleetmind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    container_name: fleetmind-postgres
    environment:
      POSTGRES_USER: fleetmind
      POSTGRES_PASSWORD: fleetmind123
      POSTGRES_DB: fleetmind
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: fleetmind-timescale
    environment:
      POSTGRES_PASSWORD: timescale123
    ports:
      - "5433:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
    restart: unless-stopped

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: fleetmind-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fleetmind-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fleetmind.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  redis-data:
  postgres-data:
  timescale-data:
